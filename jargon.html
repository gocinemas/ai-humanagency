<script>
let activeFilter = 'all';

const terms = [
  { word: "Agent", level: "intermediate", oneliner: "AI that takes actions, not just answers.", body: "A basic AI chat answers your question and stops. An agent takes the next step — search the web, run code, send an email, book a meeting. It can also plan: break a goal into steps and work through them. The difference between giving someone directions and handing them your car. Agents are why AI is shifting from chat to doing." },
  { word: "AGI", level: "advanced", oneliner: "Hypothetical AI that can do anything a human mind can.", body: "Artificial General Intelligence — AI that can perform any intellectual task a human can, not just one narrow speciality. We don't have it yet. Debate rages about whether it's 5 years or 50 years away. Most AI researchers consider current systems (including GPT-4 and Claude) to be narrow AI — very capable in specific domains, but not general." },
  { word: "AI", level: "basics", oneliner: "Software that learns from data to perform tasks that once needed human intelligence.", body: "AI is software that learns patterns from examples rather than following hand-coded rules. Recognising images, understanding language, making decisions. The term covers everything from spam filters to ChatGPT — but what most people mean today is generative AI: systems that create text, images and code on demand." },
  { word: "Alignment", level: "advanced", oneliner: "The challenge of making AI do what humans actually want.", body: "Making AI safe, honest and beneficial as it becomes more capable is harder than it sounds. A misaligned AI optimises for the wrong thing — like a paperclip maximiser that converts all matter into paperclips because that's what it was told to do. Alignment research asks how we ensure powerful AI systems remain under meaningful human control. It's the core concern of companies like Anthropic and DeepMind." },
  { word: "API", level: "intermediate", oneliner: "How you connect to AI from code or software.", body: "An API (Application Programming Interface) lets you send requests to an AI model programmatically — from your own code or application. Instead of typing into a chat box, you send a structured request and get a response back. This is how businesses build AI into their products. The chat interface disappears. The AI becomes a service behind the scenes." },
  { word: "ASR", level: "intermediate", oneliner: "Automatic Speech Recognition — converting spoken audio to text.", body: "The technology that powers voice assistants, meeting transcription tools (like Otter.ai) and live captioning. OpenAI's Whisper is one of the best open-weight ASR models, remarkably accurate across 100+ languages and accented speech. If you've ever had a meeting automatically transcribed, you've used ASR." },
  { word: "Benchmark", level: "intermediate", oneliner: "A standardised test used to compare AI model performance.", body: "When a company claims their model 'beats GPT-4', they mean it scored higher on standardised tests. Common ones include MMLU (general knowledge), HumanEval (coding) and GSM8K (maths). Useful but imperfect — models can be trained specifically to ace benchmarks without being genuinely smarter in practice. Always look for real-world evaluations alongside benchmark scores." },
  { word: "Bias", level: "intermediate", oneliner: "When AI systematically favours or disadvantages certain groups.", body: "AI inherits biases from its training data, which reflects historical human patterns. A hiring AI trained on past CVs may learn to prefer male candidates because most past hires were male. Detecting and reducing bias is active research. It doesn't mean the AI is 'racist' or 'sexist' in a human sense — it means the statistics it learned are skewed, and its outputs reflect that skew." },
  { word: "Chain of Thought", level: "intermediate", oneliner: "Asking AI to think step by step before answering.", body: "A prompting technique where you ask the model to reason through a problem before giving a final answer — 'think step by step' is often enough. Dramatically improves accuracy on maths, logic and multi-step problems. The model is forced to show its working, which also makes errors easier to spot. Most modern reasoning models (like OpenAI o1) do this automatically." },
  { word: "ChatGPT", level: "basics", oneliner: "OpenAI's AI assistant — the product that made AI mainstream.", body: "Launched in November 2022, ChatGPT reached 100 million users in 2 months — faster than any app in history. Powered by GPT-4o. Free to use at chatgpt.com. The product that made most people realise AI was actually useful, not just a science project. If you've only tried one AI tool, it was probably this one." },
  { word: "Claude", level: "basics", oneliner: "Anthropic's AI assistant — known for nuanced writing and honesty.", body: "Made by Anthropic and available at claude.ai. Designed with safety as a core principle using 'Constitutional AI' — a method that trains the model to be honest and harmless. Known for strong writing, long-document reasoning, and a tendency to say 'I'm not sure' rather than hallucinate. Often preferred over ChatGPT for complex writing and analysis tasks." },
  { word: "Context length", level: "advanced", oneliner: "The maximum tokens an AI can process in one request.", body: "Context length and context window are often used interchangeably. A model with a 200,000-token context can process roughly 150,000 words in one go — about two full novels. Longer context means more of a conversation held in memory, bigger documents analysed, more coherent long-form work. It's one of the fastest-improving specifications in the field." },
  { word: "Context window", level: "basics", oneliner: "How much text an AI can read at once.", body: "Every model has a limit to how much it can process in one go. If your conversation is longer than the context window, the model can't see the earlier parts. Imagine reading a book but only being able to see 10 pages at a time — that's the context window. Starting a fresh conversation sometimes gives better results than a very long one." },
  { word: "Copilot", level: "intermediate", oneliner: "An AI assistant built into software you already use.", body: "Microsoft Copilot is built into Word, Excel, Outlook, and Teams. More broadly, a copilot is any AI embedded in an existing tool — writing while you write, suggesting while you code. GitHub Copilot autocompletes code as you type. The assistant is inside your existing workflow, not a separate tab. Autocomplete, but for everything." },
  { word: "DALL-E", level: "basics", oneliner: "OpenAI's AI image generator, built into ChatGPT.", body: "Named after Salvador Dalí and WALL-E. Type a description, get an image. DALL-E 3 is built directly into ChatGPT — ask it to draw something and DALL-E handles it invisibly. Strong at following detailed, literal instructions. If you've ever asked ChatGPT to generate an image, DALL-E was doing the work." },
  { word: "Deep Learning", level: "intermediate", oneliner: "Machine learning using neural networks with many layers.", body: "The 'deep' refers to the many layers in the neural network. Each layer learns increasingly abstract features — pixels become edges, edges become shapes, shapes become objects. Deep learning is what gave AI the ability to recognise faces, understand speech and generate text. Before deep learning, most AI was hand-coded rules. Deep learning lets the AI figure out the rules itself." },
  { word: "Diffusion Model", level: "intermediate", oneliner: "The AI architecture behind most image and video generators.", body: "The technology powering Midjourney, DALL-E and Stable Diffusion. Trained by gradually adding noise to images until they become static, then learning to reverse the process. At generation time it starts from pure noise and refines it step by step into a coherent image matching your description. Remarkably effective — and the same approach is now being applied to video (Sora) and audio." },
  { word: "Embeddings", level: "intermediate", oneliner: "Turning text into numbers so AI can compare meaning.", body: "To search documents meaningfully, AI converts text into lists of numbers (vectors). Documents with similar meaning end up with similar numbers — enabling semantic search: finding things by what they mean, not just by matching keywords. Think of it like GPS coordinates: cities close together have similar coordinates. Embeddings are the engine behind most AI-powered search." },
  { word: "Few-shot prompting", level: "intermediate", oneliner: "Giving AI a few examples before asking it to do a task.", body: "Teaching by showing, not just telling. You provide 2–3 examples of what you want before asking the AI to do it for your actual case. Even two good examples dramatically improve accuracy on specific or unusual tasks. The alternative is zero-shot — just giving instructions with no examples. Zero-shot is faster; few-shot is more reliable when precision matters." },
  { word: "Fine-tuning", level: "intermediate", oneliner: "Training a model on your data to specialise it.", body: "Fine-tuning takes an existing model and continues training it on a specific dataset — your company tone, a specialist domain, a specific task format. The result behaves differently from the base model. More expensive and complex than prompting, but sometimes necessary. Like hiring a skilled professional and putting them through your company's induction programme." },
  { word: "Foundation model", level: "advanced", oneliner: "A massive pre-trained AI that others build on.", body: "GPT-4, Claude 3, Gemini, Llama — these are foundation models. Trained at enormous cost on vast data, they're the base layer of the AI ecosystem. Most AI products don't train from scratch — they use a foundation model and either fine-tune or prompt it. Think of it as an operating system. Most developers build applications on top of it, not their own OS." },
  { word: "Gemini", level: "basics", oneliner: "Google's AI model family, built into Search, Docs and Gmail.", body: "Google DeepMind's response to ChatGPT. Available in several sizes (Ultra, Pro, Flash, Nano). Multimodal — it handles text, images, audio and video. Built into Google Search, Docs, Gmail and Android. If you've noticed Google Search giving AI-generated summaries at the top of results, that's Gemini. Strong at tasks where real-time web access matters." },
  { word: "Generative AI / GenAI", level: "basics", oneliner: "AI that creates new content — text, images, code.", body: "Unlike earlier AI that classified or predicted, generative AI creates something new. ChatGPT writes text. Midjourney generates images. Sora generates video. GitHub Copilot writes code. The difference is like the gap between Shazam (identifies a song) and an app that composes a new one for you. Often shortened to GenAI — if you see that abbreviation in a headline, this is what it means." },
  { word: "GPT", level: "intermediate", oneliner: "OpenAI's family of language models powering ChatGPT.", body: "Generative Pre-trained Transformer. OpenAI's series of large language models — GPT-3, GPT-4, GPT-4o. The 'pre-trained' part means they were trained on vast amounts of internet text before being fine-tuned to follow instructions. When people say 'the model' inside ChatGPT, they usually mean GPT-4o. GPT is to ChatGPT what an engine is to a car." },
  { word: "Hallucination", level: "basics", oneliner: "When AI confidently says something wrong.", body: "AI doesn't 'know' things the way you do. It predicts what a plausible response looks like — and sometimes that produces facts that sound right but aren't. A fake citation, a wrong date, a statistic that doesn't exist. This is the single most important limitation to understand. Always verify claims that matter." },
  { word: "Inference", level: "advanced", oneliner: "Running a trained model to produce an answer.", body: "Training is when the model learns. Inference is when it's used — taking your input and generating a response. Every message you send to Claude or ChatGPT is inference. It requires significant compute, which is why AI APIs cost money per request. Training is writing the cookbook. Inference is cooking a meal from it." },
  { word: "Llama", level: "intermediate", oneliner: "Meta's open-weight language models — free to download and run.", body: "Meta's family of open-weight AI models (Llama 2, Llama 3). Free to download and run on your own hardware — no API fees, no data leaving your machine. The foundation for thousands of fine-tuned specialist models built by the community. Llama 3.1 405B rivals GPT-4 on many benchmarks. Meta releasing these models has democratised AI development." },
  { word: "LLM", level: "basics", oneliner: "Large Language Model — the tech behind text AI.", body: "An LLM is trained on enormous amounts of text — a large portion of the internet, books, code, conversations. It learns patterns in language and uses them to generate responses. Every major text AI (GPT-4, Claude, Gemini, Llama) is an LLM. 'Large' refers to the billions of parameters — the numerical values that encode what the model has learned." },
  { word: "Machine Learning", level: "intermediate", oneliner: "AI that learns patterns from examples rather than following rules.", body: "A subset of AI where the system learns from labelled data rather than explicit instructions. Feed it thousands of labelled spam emails and it figures out the pattern. Feed it millions of labelled images and it learns to recognise objects. LLMs are a specific type of machine learning. The key insight: you don't program the rules — the system infers them from examples." },
  { word: "Markdown", level: "basics", oneliner: "Simple formatting for text — no fancy tools needed.", body: "Markdown is plain-text formatting using simple symbols instead of buttons. *text* makes italic, **text** makes bold, # heading creates a header. Designed to be readable as plain text and as formatted text. Used everywhere: GitHub, Reddit, Slack, documentation, email. AI loves it because it's unambiguous and machine-readable. When you ask Claude to format something as Markdown, you're asking for this format so it's cleaner and easier to process." },
  { word: "Midjourney", level: "basics", oneliner: "One of the most popular AI image generators.", body: "Type a description and get photorealistic or artistic images in seconds. Known for high-quality, painterly outputs. Runs through Discord — you type commands in a chat channel. Used by designers, marketers and anyone who wants to visualise ideas without a camera or a paintbrush. Subscription-based, starting around £8/month. If you've seen impressively beautiful AI images shared on social media, there's a good chance they came from Midjourney." },
  { word: "Model", level: "basics", oneliner: "The AI engine doing the work.", body: "When you use ChatGPT, you're using a model called GPT-4. When you use Claude, you're using Anthropic's model. The model is the trained system — fed billions of words and learned to predict what comes next. Different models have different strengths and costs. The chat interface is the dashboard. The model is the engine." },
  { word: "Multimodal", level: "intermediate", oneliner: "AI that handles more than just text.", body: "Early AI was text-in, text-out. Multimodal models handle images, audio, video — or any combination. GPT-4o can describe a photo. Claude can read a PDF with charts. The difference between a pen pal and a video call. This is what makes AI genuinely useful in everyday work — you're not limited to typing." },
  { word: "Neural network", level: "advanced", oneliner: "The layered computational structure AI is built on.", body: "A neural network is a system of connected nodes, loosely inspired by the brain. Data passes through layers, each transforming it slightly, until an output emerges. LLMs are a specific, very large type of neural network. 'Deep learning' refers to networks with many layers. Like an assembly line: each station does a small transformation, and something complex emerges from simple inputs." },
  { word: "Open weight", level: "advanced", oneliner: "An AI model whose trained weights are publicly available.", body: "Anyone can download and run an open-weight model on their own hardware — no API fees, no data sent to a third party. Meta's Llama is the most prominent example. Not the same as open source (training data may still be private). The opposite is a closed model like GPT-4 or Claude, accessible only via API. Open weight models have driven huge innovation by letting anyone build on and fine-tune them." },
  { word: "Parameters", level: "advanced", oneliner: "The numerical weights inside a model that encode its knowledge.", body: "A model's parameters are the billions of numbers that result from training — encoding everything the model has learned. When people say 'a 7 billion parameter model,' this is what they mean. More parameters generally means more capability, but also more cost to run. Think of them like synaptic connections in a brain: more connections, more nuance." },
  { word: "Perplexity", level: "intermediate", oneliner: "AI-powered search with cited, real-time answers.", body: "Unlike ChatGPT, which relies on training data with a cutoff date, Perplexity searches the web in real time and cites its sources. Ask it anything and it finds, reads and summarises relevant pages — with footnotes. Better than Google for research questions. Available free at perplexity.ai. Increasingly used as a replacement for traditional search, especially for questions that require synthesis rather than a single link." },
  { word: "Prompt", level: "basics", oneliner: "What you type to get a response.", body: "Every message you send to an AI is a prompt. The quality of your prompt directly shapes the quality of the answer — a specific, clear prompt almost always beats a vague one. Think of it as a brief to a contractor: the clearer the brief, the better the work. 'Prompt engineering' is just the practice of getting better at this." },
  { word: "Prompt engineering", level: "intermediate", oneliner: "The practice of crafting prompts to get better outputs.", body: "There are patterns that consistently produce better AI responses — providing context, specifying a format, giving examples, assigning a role. Prompt engineering is the name for learning and applying these. It sounds more technical than it is. It's mostly about being specific and giving the model enough to work with. The skill transfers directly from knowing how to brief a colleague well." },
  { word: "RAG", level: "intermediate", oneliner: "Giving AI access to your own documents.", body: "Retrieval-Augmented Generation. Instead of relying on training data alone, the system retrieves relevant chunks of your documents and passes them to the model at query time. The model answers based on your files — not just what it was originally trained on. Like giving an analyst your company reports before asking a question, rather than expecting them to remember everything from memory." },
  { word: "Reasoning model", level: "intermediate", oneliner: "AI that thinks through problems step by step before answering.", body: "A class of model designed to 'think' before responding — working through a problem internally before producing an answer. OpenAI's o1 and o3 are examples. Significantly better at maths, logic, coding and complex problems than standard LLMs. Slower and more expensive to run, but far more reliable on hard tasks. The thinking is often visible — you can watch the model reason through the problem before the final answer appears." },
  { word: "Reinforcement Learning", level: "advanced", oneliner: "Training AI through trial, error, reward and penalty.", body: "The AI takes actions, receives rewards for good outcomes and penalties for bad ones, and learns a strategy that maximises rewards over time. How DeepMind trained AlphaGo to beat the world champion at Go. Also used in robotics and game-playing AI. RLHF (Reinforcement Learning from Human Feedback) applies this approach to language models — human raters score outputs, and the model learns to produce responses people prefer." },
  { word: "RLHF", level: "advanced", oneliner: "The technique that made AI assistants actually helpful.", body: "Reinforcement Learning from Human Feedback. Human raters score model outputs — 'this response is better than that one.' The model is then trained to produce outputs humans prefer. This is how ChatGPT was transformed from a raw text predictor into a helpful assistant. Without RLHF, LLMs would just generate plausible text — not actually try to be useful or safe." },
  { word: "Sora", level: "intermediate", oneliner: "OpenAI's AI video generator — text to realistic footage.", body: "Describe a scene in words and Sora generates realistic video footage — up to a minute long, with consistent motion, lighting and physics. Released in 2024. Still has limits with complex scenes, hands and very long clips, but the quality shocked the creative industries. Raises real questions about video authenticity and the future of filmmaking. Currently available to ChatGPT Plus subscribers." },
  { word: "Stable Diffusion", level: "intermediate", oneliner: "The open-weight image generator anyone can run locally.", body: "Created by Stability AI in 2022. An open-weight image generation model — download and run it on your own machine, for free, privately. More technical than Midjourney but endlessly customisable. The foundation for thousands of specialised image models. The model that opened image generation to developers and researchers without commercial budgets." },
  { word: "System prompt", level: "intermediate", oneliner: "Hidden instructions that shape how an AI behaves.", body: "Before you type a word, the AI you're using has usually been given a system prompt by whoever built the product. It sets the persona, constraints, and rules. 'You are a helpful customer service agent. Never discuss competitors.' You never see it — but it shapes every response you get." },
  { word: "Temperature", level: "intermediate", oneliner: "A dial controlling how creative or predictable AI is.", body: "Temperature (usually 0 to 1) controls how much randomness is introduced. Low = predictable, consistent. High = more creative, more surprising. For factual work like code or data extraction, keep it low. For brainstorming or creative writing, higher works better. Most chat interfaces handle this invisibly." },
  { word: "Token", level: "basics", oneliner: "The chunks AI uses to read and write text.", body: "AI doesn't read word by word. It reads in tokens — roughly mapping to words or word-parts. 'ChatGPT' is one token. 'I cannot' might be two. Tokens determine how much of a conversation fits in the context window and how much you're charged on paid APIs. A rule of thumb: 100 tokens is roughly 75 words." },
  { word: "Training data", level: "advanced", oneliner: "The text and data a model learned from.", body: "LLMs are trained on enormous datasets — large portions of the internet, books, code, conversations. Training data shapes the model's knowledge and knowledge cutoff date. The model doesn't update automatically as the world changes — new training is expensive. Like everything a person read before a certain age: it shapes how they think, but the world keeps moving." },
  { word: "Transformer", level: "advanced", oneliner: "The architecture that powers modern AI.", body: "The Transformer is a neural network design from Google's 2017 paper 'Attention Is All You Need.' It's the architecture that makes LLMs work — specifically the attention mechanism that lets the model weigh the importance of different words in context. GPT, Claude, Gemini — all Transformer-based. Most modern AI traces back to this one paper." },
  { word: "TTS", level: "intermediate", oneliner: "Text-to-Speech — AI that converts text into spoken audio.", body: "Modern TTS can clone voices, adjust emotion and pacing, and produce speech almost indistinguishable from a human. ElevenLabs is the best-known service. OpenAI's TTS is built into ChatGPT voice mode. Used in accessibility tools, video voiceovers, audiobooks and customer service. The technology that means the robot voices of old sat-navs are now largely gone." },
  { word: "Vector database", level: "advanced", oneliner: "Storage for embeddings that enables fast similarity search.", body: "When you convert documents to embeddings, you need somewhere to store and search them efficiently. A vector database finds the vectors mathematically closest to your query — similarity in meaning rather than exact keyword matching. Pinecone, Weaviate, and Supabase Vector are common examples. It's the storage layer that makes RAG fast at scale." },
  { word: "Whisper", level: "intermediate", oneliner: "OpenAI's open-weight speech recognition model.", body: "Record audio; Whisper transcribes it accurately across 100+ languages. Remarkably good on accented speech and noisy audio. Open-weight, so developers embed it in their own apps without API costs. Powers many meeting transcription tools and voice assistants. If you've used an app that transcribed a voice note or converted a podcast to text, there's a good chance Whisper was under the hood." },
  { word: "Zero-shot prompting", level: "intermediate", oneliner: "Asking AI to do something with no examples — just instructions.", body: "The simplest approach to prompting: you describe what you want and the AI does it without any demonstration. 'Classify this review as positive or negative.' Most modern LLMs are good at zero-shot because their training was so broad. Contrast with few-shot prompting, where you give 2–3 examples first. Zero-shot is faster; few-shot is more reliable for specific or unusual tasks." }
];

function badge(level) {
  const map = { basics: ['badge-basics','Basics'], intermediate: ['badge-intermediate','Intermediate'], advanced: ['badge-advanced','Advanced'] };
  const [cls, label] = map[level];
  return `<span class="term-badge ${cls}">${label}</span>`;
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render() {
  const q = (document.getElementById('search').value || '').toLowerCase();
  const filtered = terms.filter(t => {
    const matchLevel = activeFilter === 'all' || t.level === activeFilter;
    const matchQ = !q || t.word.toLowerCase().includes(q) || t.oneliner.toLowerCase().includes(q) || t.body.toLowerCase().includes(q);
    return matchLevel && matchQ;
  });

  const el = document.getElementById('terms');
  if (!filtered.length) { el.innerHTML = '<div class="no-results">No terms match. Try a different search.</div>'; updateRecentStrip(); return; }

  el.innerHTML = filtered.map((t, i) => `
    <div class="term-row" id="tr-${i}">
      <div class="term-header" onclick="toggle(${i})">
        <span class="term-name">${t.word}</span>
        <span class="term-oneliner">${t.oneliner}</span>
        ${badge(t.level)}
        <span class="term-arrow">›</span>
      </div>
      <div class="term-body">
        <div class="term-body-inner">
          <p class="term-body-text">${t.body}</p>
        </div>
      </div>
    </div>
  `).join('');
  updateRecentStrip();
}

function toggle(i) {
  const row = document.getElementById('tr-' + i);
  row.classList.toggle('open');
  if (row.classList.contains('open')) {
    const name = row.querySelector('.term-name').textContent;
    let recent = JSON.parse(localStorage.getItem('jargon_recent') || '[]');
    recent = [name, ...recent.filter(x => x !== name)].slice(0, 8);
    localStorage.setItem('jargon_recent', JSON.stringify(recent));
    updateRecentStrip();
  }
}

function updateRecentStrip() {
  const q = document.getElementById('search').value || '';
  const recent = JSON.parse(localStorage.getItem('jargon_recent') || '[]');
  const strip = document.getElementById('recent-strip');
  if (!strip) return;
  if (!recent.length || q.length > 0) { strip.style.display = 'none'; return; }
  strip.style.display = 'flex';
  strip.innerHTML = '<span class="recent-label">Recent:</span>' +
    recent.map(t => `<button class="recent-pill" onclick="jumpToTerm(${JSON.stringify(t)})">${t}</button>`).join('');
}

function jumpToTerm(name) {
  document.getElementById('search').value = '';
  setFilter('all', document.querySelector('.pill'));
  requestAnimationFrame(() => {
    const rows = document.querySelectorAll('.term-row');
    for (const row of rows) {
      if (row.querySelector('.term-name').textContent === name) {
        row.classList.add('open');
        row.scrollIntoView({ behavior: 'smooth', block: 'center' });
        break;
      }
    }
  });
}

document.addEventListener('keydown', function(e) {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    const input = document.getElementById('search');
    input.focus();
    input.select();
    input.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
});

render();
updateRecentStrip();
</script>
